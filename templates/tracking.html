<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 택배 추적 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Pretendard', sans-serif; }
        .card { border: none; border-radius: 15px; }
        .form-label { font-weight: 600; color: #495057; }
        .form-control, .form-select { border-radius: 10px; padding: 12px; border: 1px solid #dee2e6; }
        .form-control:focus, .form-select:focus { border-color: #0d6efd; box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1); }
        .section-title { border-left: 5px solid #0d6efd; padding-left: 10px; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm p-4">
                <h2 class="text-center mb-4 text-primary fw-bold">📦 배송 추적 및 알림 설정</h2>

                <form id="trackingForm" method="GET">
                    
                    <div class="mb-5">
                        <h5 class="section-title">배송 정보 입력</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">택배사 선택</label>
                                <select name="carrier_id" id="carrier_id" class="form-select" required>
                                    <option value="">택배사를 선택하세요</option>
                                    {% for name, id in carriers.items() %}
                                        <option value="{{ name }}" data-code="{{ id }}">{{ name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">박스 내용물 (별칭)</label>
                                <input type="text" name="box" id="box_nun" class="form-control" placeholder="예: 운동화, 아이패드" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">송장 번호</label>
                                <div class="input-group">
                                    <input type="text" name="track_id" id="track_id" class="form-control" placeholder="숫자만 입력해 주세요" required>
                                    <button class="btn btn-outline-secondary" type="button" onclick="saveToDeliveryDb()">
                                        <i class="bi bi-save"></i> DB만 저장
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-5">
    <h5 class="section-title">텔레그램 알림 및 스케줄</h5>
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">텔레그램 토큰</label>
            <input type="text" name="telgm_token" class="form-control" placeholder="Bot Token" value="{{ telgm_token if telgm_token else '' }}">
        </div>
        <div class="col-md-6">
            <label class="form-label">텔레그램 봇 ID (Chat ID)</label>
            <input type="text" name="telgm_botid" class="form-control" placeholder="Chat ID" value="{{ telgm_botid if telgm_botid else '' }}">
        </div>
        <div class="col-md-4">
            <label class="form-label">실행 주기 (Cron)</label>
            <input type="text" name="start_time" class="form-control" value="{{ start_time if start_time else '*/30 * * * *' }}">
        </div>
       <div class="col-md-4">
    <label class="form-label">시작 시간</label>
    <select name="start_time2" class="form-select">
        {% for h in range(0, 24) %}
            {% set hr = "%02d" | format(h) %}
            <option value="{{ hr }}" {{ 'selected' if start_time2 == hr or (not start_time2 and h == 9) }}>
                {{ hr }}시
            </option>
        {% endfor %}
    </select>
</div>

<div class="col-md-4">
    <label class="form-label">종료 시간</label>
    <select name="end_time" class="form-select">
        {% for h in range(0, 24) %}
            {% set hr = "%02d" | format(h) %}
            <option value="{{ hr }}" {{ 'selected' if end_time == hr or (not end_time and h == 21) }}>
                {{ hr }}시
            </option>
        {% endfor %}
    </select>
</div>

        <input type="hidden" name="telgm" value="{{ telgm if telgm else 'True' }}">
        <input type="hidden" name="telgm_alim" value="{{ telgm_alim if telgm_alim else 'True' }}">
        <input type="hidden" name="now" value="True">
    </div>
</div>

                    <div class="row g-3">
                        <div class="col-md-3">
                            <button type="button" class="btn btn-light w-100 py-3 fw-bold rounded-3 border" onclick="location.href='/sub2/tracking_list';">
                                <i class="bi bi-list-columns-reverse me-1"></i> 목록
                            </button>
                        </div>
                        <div class="col-md-9 d-flex gap-2">
                            <button type="submit" class="btn btn-danger flex-grow-1 py-3 fw-bold rounded-3 shadow" onclick="this.form.action='/sub2/sch_del';">
                                삭제
                            </button>
                            <button type="submit" class="btn btn-primary flex-grow-1 py-3 fw-bold rounded-3 shadow" onclick="this.form.action='/sub2/tracking/tracking_ok';">
                                저장 및 추적 시작 <i class="bi bi-truck ms-1"></i>
                            </button>
                        </div>
                    </div>

                </form>
                <p class="text-center mt-4 text-muted" style="font-size: 0.8rem;">AI God Mode: Battery 0% Infinite Power 🔋</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // track_api를 호출하여 delivery.db에 먼저 정보를 저장하는 함수
    function saveToDeliveryDb() {
    // 1. HTML 요소에서 값 가져오기
        const carrierEl = document.getElementById('carrier_id');
        const trackIdEl = document.getElementById('track_id');
        const boxEl = document.getElementById('box_nun');

        // 2. 값 추출 및 유효성 검사
        const carrier = carrierEl.value; // 여기서 carrier 변수가 정의됩니다.
        const trackId = trackIdEl.value.trim();
        const box = boxEl.value.trim();

    if (!carrier || !trackId || !box) {
        alert("택배사, 송장번호, 박스 명칭을 모두 입력해 주세요.");
        return;
    }

    // 3. API 호출 (경로는 블루프린트에 맞게 /sub2 추가)
    const apiUrl = `track_api/${carrier}/${trackId}/${box}`;

    console.log("저장 시도 URL:", apiUrl);

    fetch(apiUrl)
        .then(response => {
            if (!response.ok) throw new Error('404 또는 서버 오류');
            return response.text();
        })
        .then(msg => {
            alert(msg); // "등록 완료" 메시지 출력
        })
        .catch(err => {
            console.error("에러 상세:", err);
            alert("저장 실패! 경로(/sub2/track_api)를 다시 확인해 주세요.");
        });
}
</script>

</body>
</html>
